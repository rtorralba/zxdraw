<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background -->
  <rect width="256" height="256" rx="32" fill="#121212"/>

  <!-- ZX Spectrum stripe accent -->
  <rect x="0" y="180" width="256" height="76" rx="0" fill="#1a1a1a"/>
  <rect x="0" y="176" width="256" height="6" fill="#ff0044"/>

  <!-- "ZX" text -->
  <text x="20" y="148"
    font-family="'Segoe UI', Arial, sans-serif"
    font-weight="800"
    font-size="128"
    letter-spacing="-4"
    fill="#ffffff">ZX</text>

  <!-- "Draw" text -->
  <text x="22" y="230"
    font-family="'Segoe UI', Arial, sans-serif"
    font-weight="800"
    font-size="68"
    letter-spacing="-1"
    fill="#ff0044">Draw</text>

  <!-- Pixel art dot accent (top-right corner) -->
  <rect x="210" y="18" width="16" height="16" fill="#ff0044"/>
  <rect x="230" y="18" width="16" height="16" fill="#ff0044"/>
  <rect x="210" y="38" width="16" height="16" fill="#ff0044"/>
  <rect x="230" y="38" width="16" height="16" fill="#1a1a1a"/>
</svg>
